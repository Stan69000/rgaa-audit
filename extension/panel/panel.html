<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RGAA Audit</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 480px;
      min-height: 200px;
      max-height: 600px;
      background: #07071A;
      color: #E8E8FF;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #1A1A2E;
      background: #0D0D1A;
    }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #FF6B35, #E74C3C);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .header-text { flex: 1; }
    .header-text h1 { font-size: 14px; font-weight: 800; }
    .header-text p { font-size: 10px; color: #445; font-family: 'DM Mono', monospace; }

    /* SCORE BAR */
    .score-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: #0A0A18;
      border-bottom: 1px solid #1A1A2E;
    }
    .score-ring-wrap { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
    .score-ring-wrap svg { transform: rotate(-90deg); }
    .score-value {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace; font-weight: 800; font-size: 13px;
    }
    .score-stats { display: flex; gap: 16px; flex: 1; }
    .stat { text-align: center; }
    .stat-val { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 800; }
    .stat-lbl { font-size: 10px; color: #445; margin-top: 1px; }

    /* BOUTON AUDIT */
    .btn-audit {
      margin: 12px 16px;
      padding: 10px 0;
      background: linear-gradient(135deg, #FF6B35, #E74C3C);
      border: none; border-radius: 10px;
      color: #fff; font-weight: 700; font-size: 13px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: opacity .2s;
    }
    .btn-audit:hover { opacity: .9; }
    .btn-audit:disabled { background: #1A1A2E; color: #445; cursor: not-allowed; }

    /* FILTRES */
    .filters {
      display: flex;
      gap: 6px;
      padding: 0 16px 10px;
    }
    .filter-btn {
      padding: 4px 10px; border-radius: 999px; border: 1px solid transparent;
      font-size: 11px; font-family: 'DM Mono', monospace; cursor: pointer;
      background: #1A1A2E; color: #556; transition: all .15s;
    }
    .filter-btn.active { border-color: currentColor; }
    .filter-btn.nc { color: #FF4444; }
    .filter-btn.nc.active { background: #FF444420; }
    .filter-btn.c { color: #00C896; }
    .filter-btn.c.active { background: #00C89620; }
    .filter-btn.na { color: #888; }
    .filter-btn.na.active { background: #88888820; }
    .filter-btn.all { color: #A8A8C8; }
    .filter-btn.all.active { background: #A8A8C820; }

    /* RÉSULTATS */
    .results {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
    }
    .results::-webkit-scrollbar { width: 4px; }
    .results::-webkit-scrollbar-thumb { background: #2A2A4A; border-radius: 2px; }

    .result-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #0F0F1E;
      cursor: pointer;
      transition: background .1s;
    }
    .result-item:hover { background: #0D0D1A; border-radius: 6px; padding-left: 6px; }

    .result-id {
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: #FF6B35; font-weight: 700; min-width: 30px; margin-top: 2px;
    }
    .result-badge {
      font-size: 10px; padding: 2px 6px; border-radius: 4px;
      font-family: 'DM Mono', monospace; font-weight: 700;
      min-width: 28px; text-align: center; flex-shrink: 0; margin-top: 1px;
    }
    .badge-NC { background: #FF444425; color: #FF4444; }
    .badge-C  { background: #00C89625; color: #00C896; }
    .badge-NA { background: #88888825; color: #888; }

    .result-text { flex: 1; font-size: 12px; color: #A8A8C8; line-height: 1.5; }
    .result-snippet {
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: #445; margin-top: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 340px;
    }

    /* EXPORT */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #1A1A2E;
      display: flex;
      gap: 8px;
    }
    .btn-sm {
      padding: 6px 12px; border-radius: 8px; border: 1px solid;
      font-size: 11px; font-family: 'DM Mono', monospace;
      cursor: pointer; font-weight: 600; background: none;
      transition: all .15s;
    }
    .btn-export-json { border-color: #00C89640; color: #00C896; }
    .btn-export-json:hover { background: #00C89615; }
    .btn-ai { border-color: #8E44AD40; color: #A855F7; margin-left: auto; }
    .btn-ai:hover { background: #8E44AD15; }
    .btn-ai:disabled { opacity: .4; cursor: not-allowed; }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 32px 16px;
      color: #334;
    }
    .empty .icon { font-size: 32px; margin-bottom: 8px; }
    .empty p { font-size: 12px; line-height: 1.6; }

    /* AI PANEL */
    .ai-panel {
      background: #0D0A1A;
      border: 1px solid #2A1A3A;
      border-radius: 10px;
      padding: 12px;
      margin: 0 16px 10px;
      font-size: 12px;
      color: #C8C8E8;
      line-height: 1.7;
      display: none;
    }
    .ai-panel.visible { display: block; }
    .ai-label {
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: #A855F7; margin-bottom: 6px;
    }
    #aiText h1, #aiText h2, #aiText h3 {
      line-height: 1.3;
      margin: 8px 0 6px;
      color: #F2EDFF;
    }
    #aiText h1 { font-size: 16px; }
    #aiText h2 { font-size: 14px; }
    #aiText h3 { font-size: 13px; }
    #aiText p { margin: 6px 0; color: #D7D0EE; }
    #aiText ul, #aiText ol { margin: 6px 0 8px 18px; }
    #aiText li { margin: 4px 0; }
    #aiText strong { color: #FFF7D6; font-weight: 700; }
    #aiText code {
      font-family: 'DM Mono', monospace;
      background: #171230;
      border: 1px solid #2D2650;
      color: #C9B8FF;
      padding: 1px 5px;
      border-radius: 6px;
      font-size: 11px;
    }
    #aiText .ai-table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0 10px;
      border: 1px solid #352B5B;
      border-radius: 8px;
      overflow: hidden;
      display: block;
    }
    #aiText .ai-table th,
    #aiText .ai-table td {
      padding: 6px 8px;
      text-align: left;
      border-bottom: 1px solid #271F46;
      border-right: 1px solid #271F46;
      vertical-align: top;
      font-size: 11px;
      color: #DAD3EF;
    }
    #aiText .ai-table th {
      background: #181234;
      color: #F5F0FF;
      font-weight: 700;
    }
    #aiText .ai-table tr:last-child td { border-bottom: none; }
    #aiText .ai-table th:last-child,
    #aiText .ai-table td:last-child { border-right: none; }

    .url-display {
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: #334; padding: 0 16px 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .privacy-note {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: #556;
      padding: 0 16px 8px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">♿</div>
  <div class="header-text">
    <h1>RGAA Audit</h1>
    <p>RGAA 4.1 — Audit automatique</p>
  </div>
</div>

<div class="score-bar" id="scoreBar" style="display:none">
  <div class="score-ring-wrap">
    <svg width="56" height="56">
      <circle cx="28" cy="28" r="22" fill="none" stroke="#1A1A2E" stroke-width="6"/>
      <circle id="scoreCircle" cx="28" cy="28" r="22" fill="none"
        stroke="#00C896" stroke-width="6"
        stroke-dasharray="138.2" stroke-dashoffset="138.2"
        stroke-linecap="round"
        style="transition: stroke-dashoffset 1s ease"/>
    </svg>
    <div class="score-value" id="scoreValue" style="color:#00C896">0%</div>
  </div>
  <div class="score-stats">
    <div class="stat">
      <div class="stat-val" id="statNC" style="color:#FF4444">0</div>
      <div class="stat-lbl">Non conf.</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statC" style="color:#00C896">0</div>
      <div class="stat-lbl">Conformes</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statNA" style="color:#888">0</div>
      <div class="stat-lbl">N/A</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statTotal" style="color:#A8A8C8">0</div>
      <div class="stat-lbl">Critères</div>
    </div>
  </div>
</div>

<div class="url-display" id="urlDisplay"></div>
<div class="privacy-note">Données d’audit locales par défaut. Envoi externe uniquement si vous lancez l’analyse IA.</div>

<button class="btn-audit" id="btnAudit">▶ Lancer l'audit</button>

<div class="filters" id="filters" style="display:none">
  <button class="filter-btn all active" data-filter="all">Tous</button>
  <button class="filter-btn nc" data-filter="NC">✗ NC</button>
  <button class="filter-btn c" data-filter="C">✓ C</button>
  <button class="filter-btn na" data-filter="NA">— N/A</button>
</div>

<div class="ai-panel" id="aiPanel">
  <div class="ai-label">✨ Analyse IA (Claude)</div>
  <div id="aiText"></div>
</div>

<div class="results" id="results">
  <div class="empty">
    <div class="icon">♿</div>
    <p>Cliquez sur "Lancer l'audit"<br>pour analyser cette page.</p>
  </div>
</div>

<div class="footer" id="footer" style="display:none">
  <button class="btn-sm btn-export-json" id="btnExport">↓ JSON</button>
  <button class="btn-sm btn-ai" id="btnAI">✨ Analyse IA</button>
</div>

<script src="panel.js"></script>
</body>
</html>
