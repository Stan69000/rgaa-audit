<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Page de test — Non conforme</title>
</head>
<body>

  <!-- 1.1 NC : image sans alt -->
  <img src="photo.jpg">

  <!-- 1.1 NC : SVG sans accessibilité -->
  <svg width="24" height="24"><circle cx="12" cy="12" r="10"/></svg>

  <!-- 2.1 NC : iframe sans title -->
  <iframe src="https://example.com/embed"></iframe>

  <!-- 5.1 NC : tableau sans th -->
  <table>
    <tr><td>Nom</td><td>Prénom</td></tr>
    <tr><td>Dupont</td><td>Jean</td></tr>
  </table>

  <!-- 6.1 NC : lien vide -->
  <a href="/page"></a>

  <!-- 6.1 NC : lien générique -->
  <a href="/article">Cliquez ici</a>

  <!-- 9.1 NC : pas de h1, saut de niveau -->
  <h2>Section principale</h2>
  <h4>Sous-section (saut h2→h4)</h4>

  <!-- 11.1 NC : champ sans label -->
  <input type="text" placeholder="Votre nom">
  <input type="email" name="email">

  <!-- 12.1 NC : pas de lien d'évitement -->

  <!-- 12.8 NC : tabindex > 0 -->
  <button tabindex="5">Bouton</button>

  <!-- 7.3 NC : div cliquable sans role ni tabindex -->
  <div onclick="alert('ok')">Cliquer ici</div>

  <!-- 9.3 NC : liste simulée -->
  <p>• Premier élément</p>
  <p>• Deuxième élément</p>

</body>
</html>
