name: ✨ Nouvelle règle RGAA
description: Proposer l'implémentation d'un critère RGAA non encore couvert
title: "[Règle] Critère X.Y — "
labels: ["new-rule", "help wanted"]
body:
  - type: input
    id: criterion_id
    attributes:
      label: Identifiant du critère
      placeholder: "ex: 13.2"
    validations:
      required: true

  - type: input
    id: criterion_title
    attributes:
      label: Intitulé officiel
      placeholder: "ex: Ouverture de nouvelle fenêtre"
    validations:
      required: true

  - type: input
    id: wcag
    attributes:
      label: Critère WCAG associé
      placeholder: "ex: 3.2.5"

  - type: dropdown
    id: automatable
    attributes:
      label: Automatisabilité
      options:
        - "✅ Complètement automatisable"
        - "⚠️ Partiellement automatisable"
        - "❌ Manuel uniquement"
    validations:
      required: true

  - type: textarea
    id: detection
    attributes:
      label: Logique de détection proposée
      description: Comment détecter cette non-conformité dans le DOM ?
      placeholder: |
        ```js
        document.querySelectorAll('a[target="_blank"]').forEach(a => {
          if (!a.getAttribute('rel')?.includes('noopener')) {
            // NC : lien ouvrant une nouvelle fenêtre sans avertissement
          }
        });
        ```
      render: javascript

  - type: textarea
    id: fixture_nc
    attributes:
      label: HTML non conforme (fixture)
      render: html
      placeholder: "<a href='page.html' target='_blank'>Lien</a>"

  - type: textarea
    id: fixture_c
    attributes:
      label: HTML conforme (fixture)
      render: html
      placeholder: "<a href='page.html' target='_blank' aria-label='Lien (nouvelle fenêtre)'>Lien</a>"

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist avant de commencer
      options:
        - label: J'ai vérifié que ce critère n'est pas déjà dans `docs/RGAA-mapping.md` avec statut ✅
        - label: J'ai lu le guide de contribution (CONTRIBUTING.md)
        - label: Je m'engage à écrire un test unitaire avec les fixtures
