name: 🐛 Bug report
description: Signaler un faux positif, un crash ou un comportement inattendu
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de remplir ce formulaire avec le maximum de détails.

  - type: input
    id: criterion
    attributes:
      label: Critère RGAA concerné
      placeholder: "ex: 1.1, 3.2, 6.1…"
    validations:
      required: false

  - type: input
    id: url
    attributes:
      label: URL testée (si possible)
      placeholder: "https://…"

  - type: dropdown
    id: tool
    attributes:
      label: Outil concerné
      options:
        - CLI (Playwright)
        - Extension Chrome
        - Les deux
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Comportement observé
      placeholder: "Le critère X.Y est marqué NC alors que la page est conforme…"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: textarea
    id: html
    attributes:
      label: Extrait HTML minimal reproductible
      render: html

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environnement
      placeholder: "macOS 14 / Node 20 / Chrome 124"
