name: Site security monitoring

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL publique a verifier'
        required: false
        default: 'https://stan69000.github.io/rgaa-audit/'

permissions:
  contents: read
  issues: write

jobs:
  check-site:
    name: Check availability and security controls
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve target URL
        id: target
        run: |
          URL="${{ inputs.target_url || 'https://stan69000.github.io/rgaa-audit/' }}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Check HTTP status and TLS endpoint
        run: |
          set -euo pipefail
          URL='${{ steps.target.outputs.url }}'
          STATUS=$(curl -L -s -o /tmp/site-body.html -w "%{http_code}" "$URL")
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "Site status invalide: $STATUS"
            exit 1
          fi

          curl -L -I -s "$URL" > /tmp/site-headers.txt
          echo "HTTP status: $STATUS"

      - name: Validate in-page security policies
        run: |
          set -euo pipefail
          grep -q 'Content-Security-Policy' /tmp/site-body.html
          grep -q 'Referrer-Policy' /tmp/site-body.html
          grep -q 'Permissions-Policy' /tmp/site-body.html

      - name: Alert by opening issue on failure
        if: failure() && github.event_name != 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = `[security-monitoring] Echec verification site (${new Date().toISOString().slice(0, 10)})`;
            const body = [
              'Le monitoring securite du site a detecte un probleme.',
              '',
              `- Workflow run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              '',
              'Verifier rapidement la disponibilite du site et les meta-politiques de securite.'
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'security,monitoring',
              per_page: 20
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.data[0].number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['security', 'monitoring']
              });
            }
