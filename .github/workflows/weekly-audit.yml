name: Audit hebdomadaire

# Workflow dédié aux audits programmés sur vos propres sites
# Configurer les URLs dans les secrets GitHub : AUDIT_URLS (une URL par ligne)

on:
  schedule:
    - cron: '0 7 * * 1'   # Lundi 7h UTC
  workflow_dispatch:
    inputs:
      urls:
        description: 'URLs à auditer (une par ligne)'
        required: false

jobs:
  audit-sites:
    name: Audit ${{ matrix.url }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Modifier cette liste avec vos URLs
        url:
          - https://example.com
          # - https://votre-site.fr
          # - https://autre-site.fr

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install
        working-directory: cli
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Audit ${{ matrix.url }}
        working-directory: cli
        run: |
          SAFE_NAME=$(echo "${{ matrix.url }}" | sed 's|https://||;s|/|-|g')

          node bin/rgaa-audit.js "${{ matrix.url }}" \
            -o html \
            -s "../rapport-${SAFE_NAME}.html" \
            -S

          # Aussi en JSON pour parsing
          node bin/rgaa-audit.js "${{ matrix.url }}" \
            -o json \
            -s "../rapport-${SAFE_NAME}.json" \
            -S false

      - name: Vérifier le seuil minimal
        run: |
          SAFE_NAME=$(echo "${{ matrix.url }}" | sed 's|https://||;s|/|-|g')
          node -e "
            const r = require('./rapport-${SAFE_NAME}.json');
            const taux = r.score.taux;
            const SEUIL = 50; // Modifier selon vos exigences
            console.log('Taux:', taux + '%', '| Seuil:', SEUIL + '%');
            if (taux < SEUIL) {
              console.error('⚠️ Taux sous le seuil de', SEUIL + '%');
              // Décommenter pour bloquer le CI si sous le seuil :
              // process.exit(1);
            } else {
              console.log('✅ Taux conforme au seuil');
            }
          " SAFE_NAME=$(echo "${{ matrix.url }}" | sed 's|https://||;s|/|-|g')

      - name: Upload rapports
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ strategy.job-index }}-${{ github.run_number }}
          path: rapport-*.*
          retention-days: 90
