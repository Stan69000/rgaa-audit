name: Audit hebdomadaire

on:
  schedule:
    - cron: '0 7 * * 1'   # Lundi 7h UTC
  workflow_dispatch:
    inputs:
      urls:
        description: 'URLs a auditer (une par ligne)'
        required: false
      min_score:
        description: 'Seuil minimal de conformite (0-100)'
        required: false
        default: '50'

env:
  NODE_VERSION: '22'

permissions:
  contents: read

jobs:
  resolve-targets:
    name: Resolve targets
    runs-on: ubuntu-latest
    outputs:
      urls: ${{ steps.targets.outputs.urls }}
      min_score: ${{ steps.targets.outputs.min_score }}
    steps:
      - id: targets
        shell: bash
        run: |
          set -euo pipefail

          INPUT_URLS="${{ github.event.inputs.urls || '' }}"
          SECRET_URLS="${{ secrets.AUDIT_URLS || '' }}"
          MIN_SCORE="${{ github.event.inputs.min_score || '50' }}"

          if [[ -n "$INPUT_URLS" ]]; then
            RAW="$INPUT_URLS"
          elif [[ -n "$SECRET_URLS" ]]; then
            RAW="$SECRET_URLS"
          else
            RAW="https://example.com"
          fi

          JSON=$(printf '%s\n' "$RAW" | sed '/^\s*$/d' | jq -R -s -c 'split("\n")[:-1]')

          echo "urls=$JSON" >> "$GITHUB_OUTPUT"
          echo "min_score=$MIN_SCORE" >> "$GITHUB_OUTPUT"

  audit-sites:
    name: Audit ${{ matrix.url }}
    runs-on: ubuntu-latest
    needs: resolve-targets
    strategy:
      fail-fast: false
      matrix:
        url: ${{ fromJson(needs.resolve-targets.outputs.urls) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install
        working-directory: cli
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Audit target
        working-directory: cli
        shell: bash
        run: |
          set -euo pipefail
          SAFE_NAME=$(echo "${{ matrix.url }}" | sed 's|https\?://||;s|/|-|g')

          node bin/rgaa-audit.js "${{ matrix.url }}" \
            -o html \
            -s "../rapport-${SAFE_NAME}.html" \
            -S

          node bin/rgaa-audit.js "${{ matrix.url }}" \
            -o json \
            -s "../rapport-${SAFE_NAME}.json" \
            -S false

      - name: Enforce minimum score
        shell: bash
        run: |
          set -euo pipefail
          SAFE_NAME=$(echo "${{ matrix.url }}" | sed 's|https\?://||;s|/|-|g')
          SEUIL="${{ needs.resolve-targets.outputs.min_score }}"

          node -e "
            const r = require('./rapport-${SAFE_NAME}.json');
            const taux = r.score.taux;
            const seuil = Number(process.env.SEUIL);
            console.log('URL:', process.env.URL_TO_AUDIT);
            console.log('Taux:', taux + '%', '| Seuil:', seuil + '%');
            if (Number.isNaN(seuil)) throw new Error('Seuil invalide');
            if (taux < seuil) {
              throw new Error('Taux sous le seuil minimal');
            }
          "
        env:
          SEUIL: ${{ needs.resolve-targets.outputs.min_score }}
          URL_TO_AUDIT: ${{ matrix.url }}

      - name: Upload reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: audit-${{ strategy.job-index }}-${{ github.run_number }}
          path: rapport-*.*
          retention-days: 90
