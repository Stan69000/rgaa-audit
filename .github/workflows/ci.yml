name: RGAA Audit CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL a auditer manuellement'
        required: false
        default: 'https://example.com'
      output_format:
        description: 'Format de rapport'
        required: false
        default: 'html'
        type: choice
        options: [json, html, csv]

env:
  NODE_VERSION: '22'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chrome-store-republish-signal:
    name: Chrome Store republish signal
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect extension changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.sha }}
        run: |
          set -eu

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"
            HEAD="$PR_HEAD_SHA"
          else
            BASE="$PUSH_BEFORE_SHA"
            HEAD="$PUSH_AFTER_SHA"
          fi

          if [ -z "${BASE:-}" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="$(git rev-parse HEAD~1)"
          fi

          CHANGED="$(git diff --name-only "$BASE" "$HEAD" -- extension/ || true)"

          if [ -n "$CHANGED" ]; then
            echo "::warning title=Chrome Web Store::Des fichiers dans extension/ ont change. Une republication Chrome Web Store est necessaire apres merge/deploiement."
            {
              echo "## Chrome Web Store"
              echo ""
              echo ":warning: Des changements ont ete detectes dans \`extension/\`."
              echo ""
              echo "Action requise: incrementer \`extension/manifest.json\` (\`version\`) et republier l'extension sur Chrome Web Store."
              echo ""
              echo "Fichiers detectes:"
              echo "$CHANGED" | sed 's/^/- /'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::notice title=Chrome Web Store::Aucun changement dans extension/. Pas de republication Chrome Web Store requise pour cette PR."
            {
              echo "## Chrome Web Store"
              echo ""
              echo ":white_check_mark: Aucun changement dans \`extension/\`."
              echo ""
              echo "Aucune republication Chrome Web Store requise pour cette livraison."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: chrome-store-republish-signal
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Lint syntax
        working-directory: cli
        run: npm run lint

      - name: Validate extension manifest
        run: |
          node -e "
            const m = require('./extension/manifest.json');
            if (m.manifest_version !== 3) throw new Error('MV3 requis');
            if (!Array.isArray(m.permissions) || !m.permissions.includes('activeTab')) {
              throw new Error('permission activeTab manquante');
            }
            console.log('manifest.json valide');
          "

  test-rules:
    name: Tests regles RGAA
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Run unit tests (blocking)
        working-directory: cli
        run: npm test

  pr-audit:
    name: PR smoke audit (local fixture)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test-rules
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Install Playwright
        working-directory: cli
        run: npx playwright install chromium --with-deps

      - name: Local deterministic smoke audit
        working-directory: cli
        run: |
          node bin/rgaa-audit.js "file://$PWD/tests/fixtures/non-conforme.html" -o json -s /tmp/pr-audit.json -S false
          node -e "
            const r = require('/tmp/pr-audit.json');
            if (!r?.score || r.score.taux === undefined) throw new Error('score manquant');
            console.log('Smoke local OK. Taux:', r.score.taux + '%');
          "

      - name: Comment PR
        uses: actions/github-script@v8
        if: always() && github.event.pull_request.head.repo.fork == false
        with:
          script: |
            const fs = require('fs');
            let body = '## RGAA Audit - verification PR\n\n';
            try {
              const report = JSON.parse(fs.readFileSync('/tmp/pr-audit.json', 'utf8'));
              const score = report.score;
              body += `Smoke local sur fixture versionnee: **${score.taux}%** (${score.nonConformes} NC / ${score.conformes} C).\n`;
            } catch (e) {
              body += `Impossible de lire le rapport smoke: ${e.message}`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  audit-manuel:
    name: Audit RGAA manuel
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: test-rules
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Install Playwright + Chromium
        working-directory: cli
        run: npx playwright install chromium --with-deps

      - name: Run manual audit
        working-directory: cli
        run: |
          node bin/rgaa-audit.js "${{ github.event.inputs.target_url || 'https://example.com' }}" \
            -o "${{ github.event.inputs.output_format || 'html' }}" \
            -s "../rapport-rgaa.${{ github.event.inputs.output_format || 'html' }}" \
            -S

      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: rapport-rgaa-${{ github.run_number }}
          path: |
            rapport-rgaa.*
            cli/audit-screenshots/
          retention-days: 30

  publish:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: [lint, test-rules]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Publish npm
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `RGAA Audit ${tag}`,
              body: `## Changements\n\nVoir CHANGELOG.md pour les details.`,
              draft: false,
              prerelease: tag.includes('alpha') || tag.includes('beta'),
            });
